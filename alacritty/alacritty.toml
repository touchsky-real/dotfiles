[general]
live_config_reload = true

[window]
opacity = 0.9
decorations = "Full"
startup_mode = "Windowed"
blur = true
position = { x = 700, y = 350 }

[window.dimensions]
columns = 120
lines = 30

[window.padding]
x = 10
y = 15

[scrolling]
history = 5000
multiplier = 20

[font]
size = 12

[font.normal]
family = "CaskaydiaCove Nerd Font"

[terminal.shell]
program = "pwsh.exe"

[cursor]
style = "Beam"

[selection]
save_to_clipboard = true

[bell]
animation = "EaseOutExpo"
duration = 0

[colors.primary]
background = "#16161e"
foreground = "#d8def5"

[colors.normal]
black   = "#0f1117"
red     = "#f7768e"
green   = "#9edb6f"
yellow  = "#f5c06a"
blue    = "#82aaff"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#dfe6ff"

[colors.bright]
black   = "#5a6275"
red     = "#ff7a93"
green   = "#b9f27c"
yellow  = "#ffd580"
blue    = "#9dbbff"
magenta = "#c0a5ff"
cyan    = "#89ddff"
white   = "#f5f7ff"

[colors.dim]
black   = "#0b0d12"
red     = "#c96a7a"
green   = "#7faa58"
yellow  = "#b08b4f"
blue    = "#5f7db3"
magenta = "#8d73b8"
cyan    = "#5ea6bf"
white   = "#aab4d6"